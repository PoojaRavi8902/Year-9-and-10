<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Boolean Logic Assessment</title>

<link rel="stylesheet" href="style.css">

<style>
.main-content {
  max-width: 1000px;
  margin: 20px auto;
  padding: 20px;
}

.section {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  border-radius: 14px;
  padding: 20px;
  margin-bottom: 15px;
}

.question {
  margin-bottom: 15px;
  padding: 15px;
  border-radius: 10px;
}

.correct { background: rgba(0,255,150,0.2); }
.wrong { background: rgba(255,0,0,0.2); }

textarea, input {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: none;
  margin-top: 5px;
}

button {
  padding: 12px 18px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(90deg,#00c6ff,#0072ff);
  color: white;
  cursor: pointer;
}

button:hover {
  transform: scale(1.05);
}
</style>

</head>

<body>

<header class="hero">
  <h1>💻 Computer Science Learning Hub</h1>
  <p>Prepared by Ravi Raju</p>
</header>

<nav class="navbar">
  <a href="index.html">Home</a>
  <a href="#">Assessment</a>
</nav>

<div class="main-content">

<div class="section">
  <label><strong>Student Name</strong></label>
  <input id="student">
</div>

<div class="section">
  Score: <span id="score">0</span>
</div>

<div id="questions"></div>

<button onclick="submitTest()">Submit Test</button>

<div id="result"></div>

</div>

<footer>
  <p>Prepared for MES Cairo</p>
</footer>

<script>

// ================= DATA =================
const questions = [

{type:"mcq",q:"Output of A AND B when A=1, B=0?",opts:["0","1","Error","Undefined"],ans:"0"},
{type:"mcq",q:"Output of A OR B when A=0, B=1?",opts:["0","1","Error","Undefined"],ans:"1"},
{type:"mcq",q:"NOT 1 is?",opts:["0","1"],ans:"0"},
{type:"mcq",q:"Gate with output 1 if all inputs 1?",opts:["AND","OR","XOR"],ans:"AND"},
{type:"mcq",q:"Gate with output 1 if one input 1?",opts:["AND","OR","XOR"],ans:"XOR"},
{type:"mcq",q:"Truth table shows?",opts:["All inputs/outputs","Only outputs"],ans:"All inputs/outputs"},
{type:"mcq",q:"A+B means?",opts:["OR","AND"],ans:"OR"},
{type:"mcq",q:"A.B means?",opts:["AND","OR"],ans:"AND"},
{type:"mcq",q:"DeMorgan law?",opts:["Both","None"],ans:"Both"},
{type:"mcq",q:"Logic gates used in?",opts:["All","None"],ans:"All"},

{type:"fill",q:"XOR is also called ______ OR",ans:"exclusive"},
{type:"fill",q:"NOR is ______ of OR",ans:"not"},
{type:"fill",q:"NAND is ______ of AND",ans:"not"},
{type:"fill",q:"NOT 0 =",ans:"1"},
{type:"fill",q:"A OR B when both 0?",ans:"0"},
{type:"fill",q:"A AND B when both 1?",ans:"1"},
{type:"fill",q:"Boolean values?",ans:"0,1"},
{type:"fill",q:"Rows in 1-variable truth table?",ans:"2"},
{type:"fill",q:"AND gives 0 when input is?",ans:"0"},
{type:"fill",q:"OR gives 1 when input is?",ans:"1"},

{type:"short",q:"Define AND gate",keywords:["all inputs","1","0 otherwise"]},
{type:"short",q:"Define OR gate",keywords:["any input","1","0 if all 0"]},
{type:"short",q:"Define XOR gate",keywords:["only one","1","0 otherwise"]},
{type:"short",q:"Explain NOT gate",keywords:["invert","0 to 1","1 to 0"]},
{type:"short",q:"State DeMorgan law",keywords:["not","and","or"]},

{type:"long",q:"Explain truth tables for gates",keywords:["and","or","xor","not","truth"]},
{type:"long",q:"Simplify Boolean expression",keywords:["simplify","laws","boolean"]}

];

// ================= ENGINE =================
let score=0;

function load(){
  let html="";
  questions.forEach((q,i)=>{
    html+=`<div class="section question" id="q${i}"><b>${i+1}. ${q.q}</b><br>`;

    if(q.type=="mcq"){
      q.opts.forEach(o=>{
        html+=`<label><input type="radio" name="q${i}" value="${o}"> ${o}</label><br>`;
      });
    }

    if(q.type=="fill"){
      html+=`<input id="input${i}">`;
    }

    if(q.type=="short"||q.type=="long"){
      html+=`<textarea id="input${i}"></textarea>`;
    }

    html+=`</div>`;
  });

  document.getElementById("questions").innerHTML=html;
}

function submitTest(){
  score=0;

  questions.forEach((q,i)=>{
    let box=document.getElementById("q"+i);

    if(q.type=="mcq"){
      let val=document.querySelector(`input[name=q${i}]:checked`);
      if(val && val.value==q.ans){
        score++; box.classList.add("correct");
      } else box.classList.add("wrong");
    }

    if(q.type=="fill"){
      let val=document.getElementById("input"+i).value.toLowerCase();
      if(val.includes(q.ans)){
        score++; box.classList.add("correct");
      } else box.classList.add("wrong");
    }

    if(q.type=="short"||q.type=="long"){
      let val=document.getElementById("input"+i).value.toLowerCase();
      let matches=q.keywords.filter(k=>val.includes(k)).length;
      let marks = q.type=="short" ? (matches>0?2:0) : Math.round(5*(matches/q.keywords.length));
      score+=marks;
      if(marks>0) box.classList.add("correct");
      else box.classList.add("wrong");
    }
  });

  document.getElementById("score").innerText=score;
  document.getElementById("result").innerHTML=`<h3>Final Score: ${score}</h3>`;
}

load();

</script>

</body>
</html>
