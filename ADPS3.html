// =========================
// LOAD QUESTIONS
// =========================
function loadQuestions() {
  const container = document.getElementById("questions");
  container.innerHTML = "";

  document.getElementById("total").textContent = questions.length;

  questions.forEach((q, i) => {

    let html = `<div class="card">
    <p><b>Q${i+1}:</b> ${q.question}</p>`;

    // MCQ
    if(q.type === "mcq") {
      q.options.forEach((opt, index) => {
        html += `
        <label>
          <input type="radio" name="q${i}" value="${index}">
          ${opt}
        </label><br>`;
      });

      html += `<button onclick="checkMCQ(${i})">Check</button>`;
    }

    // FILL
    else if(q.type === "fill") {
      html += `
      <input type="text" id="input${i}" placeholder="Your answer">
      <button onclick="checkFill(${i})">Check</button>`;
    }

    // OPEN
    else {
      html += `
      <textarea id="input${i}" placeholder="Write your answer"></textarea>
      <button onclick="showMark(${i})">Show Mark Scheme</button>`;
    }

    html += `<div id="result${i}" class="result"></div></div>`;

    container.innerHTML += html;
  });
}

// =========================
// CHECK MCQ
// =========================
function checkMCQ(i) {
  const selected = document.querySelector(`input[name="q${i}"]:checked`);
  const result = document.getElementById(`result${i}`);

  if (!selected) {
    result.innerHTML = "⚠️ Select an answer";
    return;
  }

  if (Number(selected.value) === questions[i].answer) {
    result.innerHTML = "✅ Correct";
    if (!answered.has(i)) {
      score++;
      answered.add(i);
    }
  } else {
    result.innerHTML = "❌ Incorrect";
  }

  updateScore();
}

// =========================
// CHECK FILL
// =========================
function checkFill(i) {
  const val = document.getElementById(`input${i}`).value.toLowerCase().trim();
  const result = document.getElementById(`result${i}`);

  const correct = questions[i].answer;

  let isCorrect = false;

  if (Array.isArray(correct)) {
    isCorrect = correct.includes(val);
  } else {
    isCorrect = val === correct.toLowerCase();
  }

  if (isCorrect) {
    result.innerHTML = "✅ Correct";
    if (!answered.has(i)) {
      score++;
      answered.add(i);
    }
  } else {
    result.innerHTML = "❌ Incorrect";
  }

  updateScore();
}

// =========================
// SHOW MARK SCHEME
// =========================
function showMark(i) {
  const result = document.getElementById(`result${i}`);
  result.innerHTML = "<pre>" + questions[i].mark + "</pre>";
}

// =========================
// UPDATE SCORE
// =========================
function updateScore() {
  document.getElementById("score").textContent = score;
}

// =========================

}

// =========================
