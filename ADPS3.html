<footer>

</footer>

<!-- QUESTIONS DATA (ONLY THIS STAYS IN PAGE) -->
<script>
const questions = [

{type:"mcq",question:"Which loop is counter-controlled?",options:["WHILE","REPEAT","FOR","IF"],answer:2},
{type:"mcq",question:"Which is selection?",options:["FOR","WHILE","IF","REPEAT"],answer:2},
{type:"mcq",question:"Which loop always executes at least once?",options:["FOR","WHILE","REPEAT UNTIL","IF"],answer:2},

{type:"fill",question:"What does MOD return?",answer:["remainder","mod"]},
{type:"fill",question:"Which loop is best for validation?",answer:["repeat","repeat until"]},

{type:"open",question:"Write pseudocode to check EVEN or ODD.",
mark:"INPUT N\nIF N MOD 2 = 0 THEN OUTPUT 'EVEN' ELSE OUTPUT 'ODD' ENDIF"},

{type:"open",question:"Write pseudocode to find total of 5 numbers.",
mark:"Total ← 0\nFOR i ← 1 TO 5\n INPUT x\n Total ← Total + x\nNEXT i\nOUTPUT Total"},

{type:"fill",question:"Trace: Total=0; FOR i=1 to 3 → Total?",answer:"6"},

{type:"mcq",question:"Flowchart decision symbol?",
options:["Rectangle","Diamond","Circle","Arrow"],answer:1},

{type:"mcq",question:"MOD 10 of 27?",
options:["2","7","10","17"],answer:1}

];
