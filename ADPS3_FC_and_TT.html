<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Flowcharts & Trace Tables – Full Practice Engine</title>

<link rel="stylesheet" href="style.css">

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
}

.container {
  max-width:1200px;
  margin:auto;
  padding:20px;
}

.section {
  background: rgba(255,255,255,0.05);
  padding:20px;
  margin-bottom:20px;
  border-radius:12px;
}

canvas {
  width:100%;
  height:300px;
  background:#000;
  border-radius:10px;
}

button {
  padding:10px 15px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#00c6ff;
  color:white;
  cursor:pointer;
}

button:hover {
  background:#0072ff;
}

.correct {color:#00ff88;}
.wrong {color:#ff4d4d;}

table {
  width:100%;
  border-collapse:collapse;
}

td, th {
  border:1px solid white;
  padding:8px;
  text-align:center;
}
</style>
</head>

<body>

<header class="hero">
  <h1>💻 Computer Science Learning Hub</h1>
  <p>Prepared by Ravi Raju</p>
</header>

<nav class="navbar">
  <a href="index.html">Home</a>
  <a href="#">Flowcharts</a>
  <a href="#">Trace Tables</a>
</nav>

<div class="container">

<div class="section">
<h2>⏱ Exam Mode</h2>
Time Left: <span id="timer">20:00</span>
<button onclick="submitExam()">Submit</button>
</div>

<div class="section">
<h2>🎯 Score</h2>
Score: <span id="score">0</span> / <span id="total">0</span>
</div>

<div id="questions"></div>

</div>

<footer>
<p>Prepared for MES Cairo</p>
</footer>

<script>

// ================= DATA =================
const questions = [

{type:"flow",question:"Draw flowchart to find largest of 2 numbers"},
{type:"flow",question:"Draw flowchart to check EVEN/ODD"},
{type:"flow",question:"Draw flowchart to add 5 numbers"},
{type:"flow",question:"Draw flowchart to calculate average"},
{type:"flow",question:"Draw flowchart for multiplication table"},

{type:"trace",question:"a=2,b=3,c=a+b → OUTPUT c",answer:"5"},
{type:"trace",question:"x=5,y=2,z=x*y → OUTPUT z",answer:"10"},
{type:"trace",question:"n=10 MOD 3",answer:"1"},
{type:"trace",question:"total=0 FOR i=1 to 3 total+=i",answer:"6"},
{type:"trace",question:"x=4 IF x>3 OUTPUT YES",answer:"YES"}

];

// duplicate to simulate 50 questions
while(questions.length < 50){
  questions.push({...questions[questions.length % 10]});
}

// ================= ENGINE =================
let score = 0;
let answered = new Set();
let timeLeft = 1200;

// TIMER
setInterval(()=>{
  if(timeLeft<=0) return submitExam();
  timeLeft--;
  let m=Math.floor(timeLeft/60);
  let s=timeLeft%60;
  document.getElementById("timer").textContent =
    `${m}:${s<10?"0":""}${s}`;
},1000);

// LOAD QUESTIONS
function loadQuestions(){
  const container=document.getElementById("questions");
  container.innerHTML="";
  document.getElementById("total").textContent=questions.length;

  questions.forEach((q,i)=>{
    let html=`<div class="section">
    <b>Q${i+1}:</b> ${q.question}<br>`;

    if(q.type==="flow"){
      html+=`<canvas id="c${i}"></canvas>`;
    }

    if(q.type==="trace"){
      html+=`
      <input id="input${i}">
      <button onclick="check(${i})">Check</button>
      <div id="res${i}"></div>`;
    }

    html+=`</div>`;
    container.innerHTML+=html;
  });

  initCanvas();
}

// CHECK
function check(i){
  let val=document.getElementById(`input${i}`).value.trim().toUpperCase();
  let res=document.getElementById(`res${i}`);

  if(val==questions[i].answer){
    res.innerHTML="<span class='correct'>✔ Correct</span>";
    if(!answered.has(i)){score++; answered.add(i);}
  }else{
    res.innerHTML="<span class='wrong'>✘ Wrong</span>";
  }

  document.getElementById("score").textContent=score;
}

// CANVAS DRAW
function initCanvas(){
  document.querySelectorAll("canvas").forEach(c=>{
    let ctx=c.getContext("2d");
    let draw=false;

    c.onmousedown=()=>draw=true;
    c.onmouseup=()=>draw=false;
    c.onmousemove=e=>{
      if(!draw)return;
      ctx.fillStyle="white";
      ctx.fillRect(e.offsetX,e.offsetY,3,3);
    };
  });
}

// SUBMIT
function submitExam(){
  alert(`Final Score: ${score}/${questions.length}`);
}

// INIT
loadQuestions();

</script>

</body>
</html>
