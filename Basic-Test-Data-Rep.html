<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Data Representation Test (Full Engine)</title>

<link rel="stylesheet" href="style.css">

<style>
.main-content {
  max-width: 1000px;
  margin: 20px auto;
  padding: 20px;
}

.section {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  border-radius: 14px;
  padding: 20px;
  margin-bottom: 15px;
}

.question {
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 10px;
}

.correct { background: rgba(0,255,150,0.2); }
.wrong { background: rgba(255,0,0,0.2); }

textarea, input {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: none;
  margin-top: 5px;
}

button {
  padding: 12px 18px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(90deg,#00c6ff,#0072ff);
  color: white;
  cursor: pointer;
}

button:hover {
  transform: scale(1.05);
}
</style>
</head>

<body>

<header class="hero">
  <h1>💻 Computer Science Learning Hub</h1>
  <p>Prepared by Ravi Raju</p>
</header>

<nav class="navbar">
  <a href="index.html">Home</a>
  <a href="#">Test</a>
</nav>

<div class="main-content">

<div class="section">
  <label><strong>Student Name</strong></label>
  <input id="student">
</div>

<div class="section">
  Score: <span id="score">0</span> / 50
</div>

<div id="questions"></div>

<button onclick="submitTest()">Submit Test</button>

<div id="result"></div>

</div>

<footer>
  <p>Prepared for MES Cairo</p>
</footer>

<script>

// ================= FULL QUESTION BANK =================
const questions = [

{type:"mcq",q:"Binary equivalent of decimal 10?",options:["1010","1100","1001","1110"],answer:"1010"},
{type:"mcq",q:"Bits in a byte?",options:["4","8","16","32"],answer:"8"},
{type:"mcq",q:"ASCII stands for?",options:["American Standard Code for Information Interchange","Advanced System Code","None"],answer:"American Standard Code for Information Interchange"},
{type:"mcq",q:"Binary 1011 in decimal?",options:["11","10","12"],answer:"11"},
{type:"mcq",q:"Hex for 255?",options:["FF","FE","AA"],answer:"FF"},
{type:"mcq",q:"Base of binary?",options:["2","10","16"],answer:"2"},
{type:"mcq",q:"Binary of 7?",options:["0111","1110"],answer:"0111"},
{type:"mcq",q:"Nibble equals?",options:["4 bits","8 bits"],answer:"4 bits"},
{type:"mcq",q:"Largest 8-bit number?",options:["255","128"],answer:"255"},
{type:"mcq",q:"Lossless format?",options:["PNG","JPEG"],answer:"PNG"},
{type:"mcq",q:"Lossy audio?",options:["MP3","WAV"],answer:"MP3"},
{type:"mcq",q:"Unicode represents?",options:["All languages","Only English"],answer:"All languages"},
{type:"mcq",q:"Sampling rate means?",options:["Samples per second","Bits"],answer:"Samples per second"},
{type:"mcq",q:"Byte stores?",options:["256 values","8 values"],answer:"256 values"},
{type:"mcq",q:"16-bit max?",options:["65535","32767"],answer:"65535"},
{type:"mcq",q:"MOD 10 of 27?",options:["7","2"],answer:"7"},
{type:"mcq",q:"Binary addition 1111+1?",options:["10000","1111"],answer:"10000"},
{type:"mcq",q:"Octal range?",options:["0-7","0-9"],answer:"0-7"},
{type:"mcq",q:"Invalid binary?",options:["1021","1010"],answer:"1021"},
{type:"mcq",q:"Image bit depth?",options:["Colours","Pixels"],answer:"Colours"},
{type:"mcq",q:"Compression reduces?",options:["File size","Resolution"],answer:"File size"},
{type:"mcq",q:"IPO stands for?",options:["Input Process Output","Input Print Output"],answer:"Input Process Output"},
{type:"mcq",q:"Binary base?",options:["2","8"],answer:"2"},
{type:"mcq",q:"Hex base?",options:["16","10"],answer:"16"},
{type:"mcq",q:"1 KB equals?",options:["1024 bytes","1000 bytes"],answer:"1024 bytes"},
{type:"mcq",q:"Audio fidelity depends on?",options:["Sampling & bit depth","Colour"],answer:"Sampling & bit depth"},
{type:"mcq",q:"Image size depends on?",options:["Resolution & depth","File name"],answer:"Resolution & depth"},
{type:"mcq",q:"Text encoding?",options:["ASCII","JPEG"],answer:"ASCII"},
{type:"mcq",q:"Binary digits?",options:["0 and 1","0-9"],answer:"0 and 1"},
{type:"mcq",q:"Storage unit?",options:["Byte","Pixel"],answer:"Byte"},

// SHORT
{type:"short",q:"Convert 18 to binary",keywords:["10010"]},
{type:"short",q:"Convert 10101 to decimal",keywords:["21"]},
{type:"short",q:"Hex of 45",keywords:["2d","2D"]},
{type:"short",q:"Define bit",keywords:["smallest","0","1","binary"]},
{type:"short",q:"Bytes in KB",keywords:["1024"]},

// LONG
{type:"long",q:"Explain image file size calculation",keywords:["pixels","bits","bytes","width","height"]},
{type:"long",q:"Explain audio file size calculation",keywords:["sampling","bit","seconds","bytes"]}

];

// ================= ENGINE =================
let score=0;

function load(){
  let html="";
  questions.forEach((q,i)=>{
    html+=`<div class="section question" id="q${i}"><b>${i+1}. ${q.q}</b><br>`;

    if(q.type=="mcq"){
      q.options.forEach(opt=>{
        html+=`<label><input type="radio" name="q${i}" value="${opt}"> ${opt}</label><br>`;
      });
    }

    if(q.type!="mcq"){
      html+=`<textarea id="input${i}"></textarea>`;
    }

    html+=`<div id="res${i}"></div></div>`;
  });

  document.getElementById("questions").innerHTML=html;
}

function submitTest(){
  score=0;

  questions.forEach((q,i)=>{
    let res=document.getElementById("res"+i);
    let box=document.getElementById("q"+i);

    if(q.type=="mcq"){
      let val=document.querySelector(`input[name=q${i}]:checked`);
      if(val && val.value==q.answer){
        score++; box.classList.add("correct");
      } else box.classList.add("wrong");
    }

    if(q.type=="short"){
      let val=document.getElementById("input"+i).value.toLowerCase();
      let ok=q.keywords.some(k=>val.includes(k.toLowerCase()));
      if(ok){ score+=2; box.classList.add("correct"); }
      else box.classList.add("wrong");
    }

    if(q.type=="long"){
      let val=document.getElementById("input"+i).value.toLowerCase();
      let matches=q.keywords.filter(k=>val.includes(k.toLowerCase())).length;
      let marks=Math.round(5*(matches/q.keywords.length));
      score+=marks;
      if(marks>=3) box.classList.add("correct");
      else box.classList.add("wrong");
    }
  });

  document.getElementById("score").innerText=score;
  document.getElementById("result").innerHTML=
    `<h3>Final Score: ${score}/50</h3>`;
}

load();

</script>

</body>
</html>
