<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Databases — Full SQL Lab</title>

<link rel="stylesheet" href="style.css">

<style>
.main-content {
  max-width: 1200px;
  margin: 20px auto;
  padding: 20px;
}

.grid {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 20px;
}

.section {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  border-radius: 14px;
  padding: 20px;
  margin-bottom: 15px;
}

textarea {
  width: 100%;
  height: 120px;
  border-radius: 10px;
  border: none;
  padding: 10px;
  font-family: monospace;
}

button {
  padding: 10px 15px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(90deg,#00c6ff,#0072ff);
  color: white;
  cursor: pointer;
}

.output {
  margin-top: 10px;
  border-radius: 10px;
  padding: 10px;
  background: rgba(0,0,0,0.4);
}

table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  padding: 8px;
  border-bottom: 1px solid rgba(255,255,255,0.2);
}
</style>

</head>

<body>

<header class="hero">
  <h1>💻 Computer Science Learning Hub</h1>
  <p>Prepared by Ravi Raju</p>
</header>

<nav class="navbar">
  <a href="index.html">Home</a>
  <a href="#">SQL Lab</a>
</nav>

<div class="main-content">

<div class="grid">

<!-- LEFT -->
<div class="section">
<h2>💻 SQL Runner</h2>

<textarea id="sqlInput">SELECT HospitalNumber, FirstName, FamilyName
FROM PATIENT
WHERE Consultant = 'Mr Smith';</textarea>

<button onclick="runSQL()">Run SQL</button>

<div id="output" class="output"></div>
</div>

<!-- RIGHT -->
<div class="section">
<h3>📊 Data Preview</h3>
<table id="preview"></table>
</div>

</div>

</div>

<footer>
<p>Prepared for MES Cairo</p>
</footer>

<script>

// ================= FULL DATA =================
const PATIENT = [
{ HospitalNumber:'HN000001', FirstName:'Winnie', FamilyName:'Sing', DateOfAdmission:'2022-10-12', Consultant:'Mr Smith', WardNumber:6 },
{ HospitalNumber:'HN000002', FirstName:'Steve', FamilyName:'Chow', DateOfAdmission:'2022-10-23', Consultant:'Miss Abebe', WardNumber:6 },
{ HospitalNumber:'HN000003', FirstName:'Chin', FamilyName:'Wee', DateOfAdmission:'2022-10-30', Consultant:'Mr Jones', WardNumber:7 },
{ HospitalNumber:'HN000004', FirstName:'Min', FamilyName:'Hoo', DateOfAdmission:'2022-11-01', Consultant:'Mr Smith', WardNumber:6 },
{ HospitalNumber:'HN000005', FirstName:'Peter', FamilyName:'Patel', DateOfAdmission:'2022-11-12', Consultant:'Mr Jones', WardNumber:7 },
{ HospitalNumber:'HN000006', FirstName:'Sue', FamilyName:'Sands', DateOfAdmission:'2022-11-19', Consultant:'Miss Abebe', WardNumber:6 },
{ HospitalNumber:'HN000007', FirstName:'Farouk', FamilyName:'Khan', DateOfAdmission:'2022-11-22', Consultant:'Mr Jones', WardNumber:7 },
{ HospitalNumber:'HN000008', FirstName:'Ahmad', FamilyName:'Teo', DateOfAdmission:'2022-11-22', Consultant:'Mr Jones', WardNumber:7 }
];

// ================= PREVIEW =================
function loadPreview(){
  let html="<tr><th>ID</th><th>First</th><th>Family</th><th>Consultant</th></tr>";
  PATIENT.forEach(p=>{
    html+=`<tr><td>${p.HospitalNumber}</td><td>${p.FirstName}</td><td>${p.FamilyName}</td><td>${p.Consultant}</td></tr>`;
  });
  document.getElementById("preview").innerHTML=html;
}

// ================= FULL SQL ENGINE =================
function runSQL(){
  let sql=document.getElementById("sqlInput").value.trim();

  if(!sql.toUpperCase().includes("SELECT") || !sql.toUpperCase().includes("FROM")){
    return showError("Only SELECT queries supported");
  }

  let rows=[...PATIENT];

  // WHERE
  let whereMatch = sql.match(/WHERE (.+?)(ORDER BY|$)/i);
  if(whereMatch){
    let cond = whereMatch[1].trim();
    rows = rows.filter(r => evalCond(r, cond));
  }

  // ORDER BY
  let orderMatch = sql.match(/ORDER BY (\w+)/i);
  if(orderMatch){
    let key = orderMatch[1];
    rows.sort((a,b)=>a[key]>b[key]?1:-1);
  }

  display(rows);
}

// ================= CONDITION PARSER =================
function evalCond(row, cond){

  // BETWEEN
  let between = cond.match(/(\w+) BETWEEN '([^']+)' AND '([^']+)'/i);
  if(between){
    let k=between[1];
    return row[k] >= between[2] && row[k] <= between[3];
  }

  // IN
  let inMatch = cond.match(/(\w+) IN \(([^)]+)\)/i);
  if(inMatch){
    let k=inMatch[1];
    let vals=inMatch[2].replace(/'/g,'').split(',');
    return vals.includes(row[k]);
  }

  // LIKE
  let like = cond.match(/(\w+) LIKE '(.+)'/i);
  if(like){
    let k=like[1];
    let val=like[2].replace('%','');
    return row[k].includes(val);
  }

  // =
  let eq = cond.match(/(\w+) = '([^']+)'/i);
  if(eq){
    return row[eq[1]] == eq[2];
  }

  // <>
  let ne = cond.match(/(\w+) <> (\d+)/i);
  if(ne){
    return row[ne[1]] != Number(ne[2]);
  }

  return true;
}

// ================= OUTPUT =================
function display(rows){
  let html="<table><tr><th>ID</th><th>Name</th></tr>";
  rows.forEach(r=>{
    html+=`<tr><td>${r.HospitalNumber}</td><td>${r.FirstName}</td></tr>`;
  });
  html+="</table>";
  document.getElementById("output").innerHTML=html;
}

function showError(msg){
  document.getElementById("output").innerHTML=`<div style="color:red">${msg}</div>`;
}

loadPreview();

</script>

</body>
</html>
